services:
  postgres:
    image: postgres:16-alpine
    container_name: pokemon-project-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pokemon_project}
      POSTGRES_USER: ${POSTGRES_USER:-pokemon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pokemon}
    volumes:
      - pokemon_project_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pokemon} -d ${POSTGRES_DB:-pokemon_project}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pokemon_project_postgres_data:
